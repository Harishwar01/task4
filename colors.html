<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color theory</title>
    <style>

        h1{
            text-align: center;
        }
        .outerdiv {
            height: 300px;
            width: 300px;
            border: 2px solid black;
            margin: 10px;

        }

        .innerdiv {
            height: 200px;
            width: 200px;
            border: 2px solid black;
            margin: auto;
            border-radius: 50%;
            margin-top: 20px;
        }

        h2 {
            text-align: center;

        }

        .parentdiv {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;

        }


        #c1 {
            background-color: red;
        }

        #c2 {
            background-color: #00ff00;
        }

        #c3 {
            background-color: rgb(0, 0, 255)
        }

        #c4 {
            background-color: rgb(0, 188, 0, 0.5);
        }

        #c5 {
            background-color: hsl(20, 70%, 50%)
        }

        #c6 {
            background-color: hsla(70, 99%, 85%)
        }
    </style>
</head>

<body>
    <h1>Color theory</h1>

    <div class="parentdiv">
        <div class="outerdiv">
            <h2>colorname</h2>
            <div class="innerdiv" id="c1">

            </div>

        </div>
        <div class="outerdiv">
            <h2>Hexadecimal</h2>
            <div class="innerdiv" id="c2">

            </div>


        </div>
        <div class="outerdiv">
            <h2>RGB</h2>
            <div class="innerdiv" id="c3">

            </div>


        </div>
        <div class="outerdiv">
            <h2>RGBA</h2>
            <div class="innerdiv" id="c4">

            </div>


        </div>
        <div class="outerdiv">
            <h2>HSL</h2>
            <div class="innerdiv" id="c5">

            </div>


        </div>
        <div class="outerdiv">
            <h2>HSLA</h2>
            <div class="innerdiv" id="c6">

            </div>
        </div>
    </div>

</body>

</html>
